<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
<style>
    body {
        background-color: #2b2b2b;
        font-family: Arial, sans-serif;
        color: #eeeeee;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 50px;
        gap: 20px;
    }

    .Error {
        background-color: #3a3a3a;
        width: 400px;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px #111;
        text-align: center;
    }

    .Error h1 {
        margin: 0 0 15px;
        color: #ffffff;
        font-size: 60px;
    }

    .Message {
        color: #dddddd;
        font-size: 18px;
    }
</style>
</head>

<body>
        <div class="Error">
            <h1>{{ error.status_code }}</h1>

            <div class="Message">
                {{ error.detail }}
            </div>
        </div>
</body>
</html>
