<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <style>
        body {
            background-color: #2b2b2b;
            font-family: Arial, sans-serif;
            color: #eeeeee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            gap: 20px;
        }

        .task {
            background-color: #3a3a3a;
            width: 400px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px #111;
        }

        h1 {
            margin: 0 0 10px;
            color: #ffffff;
        }

        .date {
            color: #aaaaaa;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .content {
            color: #dddddd;
            line-height: 1.5;
        }

        .status {
            margin-top: 20px;
            padding: 8px;
            background-color: #555555;
            border-radius: 5px;
            text-align: center;
        }
    </style>
</head>

<body>
    {% for task in tasks %}
        <div class="task">
            <h1>{{ task.title }}</h1>

            <div class="date">
                {{ task.date_created.strftime("%d %B %Y") }}
            </div>

            <div class="content">
                {{ task.content }}
            </div>

            <div class="status">
                Status: {{ task.status }}
            </div>
        </div>
    {% endfor %}
</body>
</html>
